name: Android OTA Update

on:
  push:
    branches:
      - main
      - preview
    paths:
      - "frontend/app/**"
      - "frontend/src/**"
      - "frontend/assets/**"

jobs:
  publish-update:
    name: Publish OTA Update
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          token: ${{ secrets.EXPO_TOKEN }}
          eas-version: latest
          expo-version: latest

      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Create .env file
        working-directory: ./frontend
        run: |
          echo "EXPO_PUBLIC_FIREBASE_API_KEY=${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}" >> .env
          echo "EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}" >> .env
          echo "EXPO_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}" >> .env
          echo "EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}" >> .env
          echo "EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}" >> .env
          echo "EXPO_PUBLIC_FIREBASE_APP_ID=${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}" >> .env
          echo "EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID=${{ secrets.EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID }}" >> .env
          echo "EXPO_PUBLIC_API_URL=${{ secrets.EXPO_PUBLIC_API_URL }}" >> .env

      - name: Publish OTA Update
        working-directory: ./frontend
        env:
          CI: 1
        run: |
          BRANCH_NAME=${GITHUB_REF_NAME}
          COMMIT_MSG=$(git log -1 --pretty=%s)

          eas update \
            --platform android \
            --branch "$BRANCH_NAME" \
            --message "$COMMIT_MSG"

          if [ "$BRANCH_NAME" == "main" ]; then
            eas update \
              --platform android \
              --branch preview \
              --message "$COMMIT_MSG"
          fi

      - name: Summary
        run: |
          echo "## OTA Update Published" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${GITHUB_REF_NAME}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** $(git log -1 --pretty=%s)" >> $GITHUB_STEP_SUMMARY
